name: Refresh live data

on:
  schedule:
    # Every 10 min, 12pm–2am EDT (16:00–06:00 UTC). One entry per minute mark
    # so GitHub's scheduler is more likely to fire at least one on time.
    - cron: '0  16-23 * * *'
    - cron: '10 16-23 * * *'
    - cron: '20 16-23 * * *'
    - cron: '30 16-23 * * *'
    - cron: '40 16-23 * * *'
    - cron: '50 16-23 * * *'
    - cron: '0  0-6 * * *'
    - cron: '10 0-6 * * *'
    - cron: '20 0-6 * * *'
    - cron: '30 0-6 * * *'
    - cron: '40 0-6 * * *'
    - cron: '50 0-6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch live data
        run: node scripts/fetch-data.mjs
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Build
        run: npm run build
        env:
          VITE_API_KEY: ${{ secrets.VITE_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
